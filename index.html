<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculator</title>
</head>

<body>
  <div id="calculator">
    <div id="result"></div>
    <div id="buttonContainer">
        <div class="row">
            <button class="clearBtn">AC</button>
            <button class="deleteBtn">Del</button>
            <button class="percentBtn">%</button>
            <button class="calcBtn">/</button>    
        </div>
        <div class="row">
            <button class="numBtn">7</button>
            <button class="numBtn">8</button>
            <button class="numBtn">9</button>
            <button class="calcBtn">*</button>    
        </div>
        <div class="row">
            <button class="numBtn">4</button>
            <button class="numBtn">5</button>
            <button class="numBtn">6</button>
            <button class="calcBtn">-</button>   
        </div>
        <div class="row">
            <button class="numBtn">1</button>
            <button class="numBtn">2</button>
            <button class="numBtn">3</button>
            <button class="calcBtn">+</button>    
        </div>
        <div class="row">
            <button class="numBtn">0</button>
            <button class="floatBtn">.</button>
            <button class="resultBtn">=</button>    
        </div>
        
    </div>
  </div>

<script src="./script.js"></script>
</body>
</html>
